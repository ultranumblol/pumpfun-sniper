<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pump.fun Sniper Scorer</title>
  <style>
    :root {
      --bg:      #0a0b0f;
      --card:    #111218;
      --card2:   #161820;
      --border:  #1f2133;
      --text:    #e2e4f0;
      --muted:   #6b7394;
      --snipe:   #00c896;
      --caution: #f5a623;
      --avoid:   #ff4d6a;
      --orange:  #ff6b35;
      --blue:    #4a9eff;
      --purple:  #7c6ff0;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── TOP BAR ─────────────────────────────────────── */
    .top-bar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 24px;
      border-bottom: 1px solid var(--border);
      background: rgba(10,11,15,.95);
      position: sticky; top: 0; z-index: 100;
    }
    .logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 16px; }
    .logo-sub { font-size: 11px; color: var(--muted); font-weight: 400; margin-top: 2px; }
    .powered { font-size: 11px; color: var(--muted); }
    .powered span { color: var(--orange); }

    /* ── SEARCH ──────────────────────────────────────── */
    .search-wrap { max-width: 820px; margin: 36px auto 0; padding: 0 20px; }
    .search-label { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 10px; }
    .search-row { display: flex; gap: 10px; }
    .search-row input {
      flex: 1; background: var(--card); border: 1px solid var(--border);
      border-radius: 10px; padding: 13px 18px; color: var(--text); font-size: 14px;
      outline: none; transition: border-color .2s;
    }
    .search-row input:focus { border-color: var(--orange); }
    .search-row input::placeholder { color: var(--muted); }
    .btn-score {
      background: linear-gradient(135deg, var(--orange), #f7a85f);
      border: none; border-radius: 10px; padding: 13px 28px;
      color: #0a0b0f; font-size: 14px; font-weight: 700;
      cursor: pointer; transition: opacity .2s, transform .1s; white-space: nowrap;
    }
    .btn-score:hover { opacity: .88; }
    .btn-score:active { transform: scale(.97); }
    .btn-score:disabled { opacity: .5; cursor: not-allowed; }

    /* ── SPINNER ─────────────────────────────────────── */
    .spinner-wrap { text-align: center; margin: 60px 0; }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--border); border-top-color: var(--orange);
      border-radius: 50%; animation: spin .7s linear infinite; display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner-text { color: var(--muted); margin-top: 14px; font-size: 13px; }

    /* ── RESULTS ─────────────────────────────────────── */
    #results { max-width: 820px; margin: 28px auto 60px; padding: 0 20px; }
    .hidden { display: none !important; }

    /* ── VERDICT HERO ────────────────────────────────── */
    .verdict-hero {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 20px;
      align-items: center;
      margin-bottom: 14px;
    }
    @media (max-width: 560px) {
      .verdict-hero { grid-template-columns: 1fr; text-align: center; }
      .token-price-block { text-align: center; }
    }
    .token-icon-wrap { position: relative; flex-shrink: 0; }
    .token-img {
      width: 64px; height: 64px; border-radius: 50%;
      object-fit: cover; background: var(--card2);
    }
    .token-img-placeholder {
      width: 64px; height: 64px; border-radius: 50%;
      background: linear-gradient(135deg, var(--orange), #f7a85f);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 800; color: #0a0b0f;
    }
    .verdict-badge {
      position: absolute; bottom: -4px; right: -4px;
      padding: 2px 7px; border-radius: 10px; font-size: 10px; font-weight: 800;
      letter-spacing: .06em; border: 2px solid var(--bg);
    }
    .vb-snipe   { background: var(--snipe);   color: #0a0b0f; }
    .vb-caution { background: var(--caution); color: #0a0b0f; }
    .vb-avoid   { background: var(--avoid);   color: #fff; }

    .token-info { flex: 1; min-width: 0; }
    .token-sym-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .t-symbol { font-size: 22px; font-weight: 800; }
    .t-name   { font-size: 13px; color: var(--muted); }
    .badge-row { display: flex; gap: 7px; margin-top: 8px; flex-wrap: wrap; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 600; }
    .badge-age    { background: rgba(74,158,255,.15); color: var(--blue); border: 1px solid rgba(74,158,255,.3); }
    .badge-dex    { background: rgba(255,107,53,.12); color: var(--orange); border: 1px solid rgba(255,107,53,.3); }
    .badge-new    { background: rgba(245,166,35,.15); color: var(--caution); border: 1px solid rgba(245,166,35,.3); }

    .social-row { display: flex; gap: 7px; margin-top: 10px; flex-wrap: wrap; }
    .social-link {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 11px; border-radius: 20px; font-size: 11px; font-weight: 600;
      text-decoration: none; background: var(--card2); border: 1px solid var(--border);
      color: var(--text); transition: border-color .2s;
    }
    .social-link:hover { border-color: var(--orange); color: var(--orange); }

    .token-price-block { text-align: right; }
    .t-price { font-size: 24px; font-weight: 800; }
    .t-chg { font-size: 13px; font-weight: 600; margin-top: 4px; }
    .up { color: var(--snipe); } .down { color: var(--avoid); } .flat { color: var(--muted); }

    /* ── STATS GRID ──────────────────────────────────── */
    .stats-grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 14px;
    }
    @media (max-width: 600px) { .stats-grid { grid-template-columns: repeat(2,1fr); } }
    .stat-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px;
    }
    .stat-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 6px; }
    .stat-value { font-size: 18px; font-weight: 700; }

    /* ── PRICE CHANGES ROW ───────────────────────────── */
    .price-change-row {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 14px 20px; display: flex; gap: 20px; margin-bottom: 14px; flex-wrap: wrap;
    }
    .pc-item { text-align: center; flex: 1; min-width: 50px; }
    .pc-label { font-size: 11px; color: var(--muted); text-transform: uppercase; }
    .pc-val   { font-size: 16px; font-weight: 700; margin-top: 4px; }

    /* ── BUY/SELL ─────────────────────────────────────── */
    .txn-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 16px 20px; margin-bottom: 14px;
    }
    .txn-title { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 12px; }
    .txn-row { display: flex; gap: 12px; align-items: center; margin-bottom: 10px; }
    .txn-period { font-size: 11px; color: var(--muted); width: 24px; flex-shrink: 0; }
    .ratio-bar { flex: 1; height: 10px; border-radius: 5px; background: var(--card2); overflow: hidden; display: flex; }
    .buy-fill  { height: 100%; background: var(--snipe); transition: width .5s; }
    .sell-fill { height: 100%; background: var(--avoid); transition: width .5s; }
    .txn-nums { font-size: 12px; white-space: nowrap; min-width: 100px; text-align: right; }
    .txn-b { color: var(--snipe); } .txn-s { color: var(--avoid); }

    /* ── SCORE + BREAKDOWN ───────────────────────────── */
    .score-section {
      display: grid; grid-template-columns: 200px 1fr; gap: 14px; margin-bottom: 14px;
    }
    @media (max-width: 520px) { .score-section { grid-template-columns: 1fr; } }

    .score-gauge-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    .gauge-wrap { position: relative; width: 120px; height: 120px; }
    .gauge-wrap svg { width: 100%; height: 100%; transform: rotate(-90deg); }
    .gauge-bg  { fill: none; stroke: var(--border); stroke-width: 9; }
    .gauge-arc { fill: none; stroke-width: 9; stroke-linecap: round; transition: stroke-dashoffset .6s ease; }
    .gauge-num {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 30px; font-weight: 900;
    }
    .gauge-verdict { font-size: 13px; font-weight: 800; letter-spacing: .06em; text-transform: uppercase; }

    .breakdown-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 18px 20px;
    }
    .bd-title { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 14px; }
    .bd-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .bd-row:last-child { margin-bottom: 0; }
    .bd-label { width: 120px; font-size: 12px; color: var(--text); flex-shrink: 0; }
    .bd-track { flex: 1; height: 8px; background: var(--card2); border-radius: 4px; overflow: hidden; }
    .bd-fill { height: 100%; border-radius: 4px; transition: width .5s; }
    .bd-score { font-size: 12px; font-weight: 700; width: 50px; text-align: right; flex-shrink: 0; }

    /* ── DEV WALLET ──────────────────────────────────── */
    .dev-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 16px 20px; margin-bottom: 14px;
    }
    .dev-title { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 12px; }
    .dev-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .dev-addr {
      display: flex; align-items: center; gap: 6px;
      font-family: monospace; font-size: 12px; color: var(--blue);
      text-decoration: none; flex: 1; min-width: 0;
    }
    .dev-addr:hover { text-decoration: underline; }
    .dev-sol {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 600;
      background: var(--card2); border: 1px solid var(--border);
    }
    .sol-ok      { color: var(--snipe);   border-color: rgba(0,200,150,.3) !important; }
    .sol-warn    { color: var(--caution); border-color: rgba(245,166,35,.3) !important; }
    .sol-danger  { color: var(--avoid);   border-color: rgba(255,77,106,.3) !important; }

    .copy-btn {
      background: none; border: none; cursor: pointer; color: var(--muted); font-size: 12px;
      padding: 2px 5px; border-radius: 4px; transition: color .15s;
    }
    .copy-btn:hover { color: var(--text); }

    /* ── SIGNALS ─────────────────────────────────────── */
    .signals-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 16px 20px; margin-bottom: 14px;
    }
    .sig-title { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; margin-bottom: 10px; }
    .sig-item {
      padding: 8px 0; border-bottom: 1px solid var(--border);
      font-size: 13px; line-height: 1.5;
    }
    .sig-item:last-child { border-bottom: none; }
    .sig-ok     { color: var(--snipe); }
    .sig-warn   { color: var(--caution); }
    .sig-danger { color: var(--avoid); }
    .sig-info   { color: var(--muted); }

    /* ── DESC ────────────────────────────────────────── */
    .desc-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 14px 20px; margin-bottom: 14px; font-size: 13px; color: var(--muted); line-height: 1.6;
    }

    /* ── ERROR ───────────────────────────────────────── */
    .error-box {
      background: rgba(255,77,106,.1); border: 1px solid rgba(255,77,106,.3);
      border-radius: 12px; padding: 18px 22px; color: var(--avoid); font-size: 14px;
    }
    .error-box strong { display: block; margin-bottom: 4px; }

    /* ── FOOTER ──────────────────────────────────────── */
    .footer {
      text-align: center; padding: 20px; font-size: 11px; color: var(--muted);
      border-top: 1px solid var(--border); margin-top: 40px;
    }
    .footer a { color: var(--orange); text-decoration: none; }
  </style>
</head>
<body>

<div class="top-bar">
  <div class="logo">
    <span>🎯</span>
    <div>
      <div>pump.fun Sniper Scorer</div>
      <div class="logo-sub">Dev reputation · Holder risk · Market signals · Snipe safety score</div>
    </div>
  </div>
  <div class="powered">Powered by <span>x402</span> micropayments</div>
</div>

<div class="search-wrap">
  <div class="search-label">Token Contract Address (CA)</div>
  <div class="search-row">
    <input id="ca-input" type="text"
      placeholder="Paste pump.fun token CA…"
      onkeydown="if(event.key==='Enter') analyze()" />
    <button class="btn-score" id="btn-go" onclick="analyze()">Score It</button>
  </div>
</div>

<div id="spinner" class="spinner-wrap hidden">
  <div class="spinner"></div>
  <div class="spinner-text">Scanning dev wallet, holders, market signals… (10–20s)</div>
</div>

<div id="error-area" style="max-width:820px;margin:20px auto;padding:0 20px"></div>

<div id="results" class="hidden"></div>

<div class="footer">
  Data: pump.fun · DexScreener · Solana RPC &nbsp;·&nbsp;
  AI agent access via <a href="https://clawhub.ai" target="_blank">ClawHub</a> ($0.05 USDC/request)
</div>

<script>
  const CIRC = 2 * Math.PI * 40;
  const VERDICT_LABEL = { SNIPE: '🎯 SNIPE', CAUTION: '⚠️ CAUTION', AVOID: '🚨 AVOID' };
  const VERDICT_COLOR = { SNIPE: 'var(--snipe)', CAUTION: 'var(--caution)', AVOID: 'var(--avoid)' };
  const BD_LABELS = { dev_wallet: 'Dev Wallet', social: 'Social', liquidity: 'Liquidity', concentration: 'Distribution' };

  function fmt(n) {
    if (!n) return '—';
    if (n >= 1e9) return '$' + (n/1e9).toFixed(2) + 'B';
    if (n >= 1e6) return '$' + (n/1e6).toFixed(2) + 'M';
    if (n >= 1e3) return '$' + (n/1e3).toFixed(1) + 'K';
    return '$' + n.toFixed(0);
  }

  function fmtPrice(p) {
    const n = parseFloat(p);
    if (!n) return '—';
    if (n >= 1) return '$' + n.toFixed(4);
    if (n >= 0.01) return '$' + n.toFixed(6);
    if (n >= 0.0001) return '$' + n.toFixed(8);
    return '$' + n.toExponential(4);
  }

  function pctCls(v) { return v > 0 ? 'up' : v < 0 ? 'down' : 'flat'; }
  function pctStr(v) {
    if (v === null || v === undefined) return '—';
    return (v > 0 ? '+' : '') + v.toFixed(2) + '%';
  }

  function shortAddr(a) { return a.slice(0,6) + '…' + a.slice(-4); }

  function sigClass(s) {
    if (s.startsWith('✅')) return 'sig-ok';
    if (s.startsWith('🚨')) return 'sig-danger';
    if (s.startsWith('⚠️')) return 'sig-warn';
    return 'sig-info';
  }

  function bdColor(ratio) {
    if (ratio >= 0.65) return 'var(--snipe)';
    if (ratio >= 0.35) return 'var(--caution)';
    return 'var(--avoid)';
  }

  async function analyze() {
    const ca = document.getElementById('ca-input').value.trim();
    if (!ca) return;
    document.getElementById('btn-go').disabled = true;
    document.getElementById('results').classList.add('hidden');
    document.getElementById('error-area').innerHTML = '';
    document.getElementById('spinner').classList.remove('hidden');
    try {
      const res = await fetch(`/demo?ca=${encodeURIComponent(ca)}`);
      const data = await res.json();
      if (!res.ok) {
        document.getElementById('error-area').innerHTML =
          `<div class="error-box"><strong>Error</strong>${data.detail || 'Analysis failed'}</div>`;
        return;
      }
      render(data);
    } catch (e) {
      document.getElementById('error-area').innerHTML =
        `<div class="error-box"><strong>Error</strong>Network error — please try again.</div>`;
    } finally {
      document.getElementById('spinner').classList.add('hidden');
      document.getElementById('btn-go').disabled = false;
    }
  }

  function render(d) {
    const t = d.token;
    const score = d.score;
    const verdict = d.verdict;
    const vColor = VERDICT_COLOR[verdict];
    const vbCls = { SNIPE: 'vb-snipe', CAUTION: 'vb-caution', AVOID: 'vb-avoid' }[verdict];
    const pc = t.price_change || {};
    const txns = t.txns || {};

    // ── Verdict hero ─────────────────────────────────────────────────────────
    const imgHtml = t.image_uri
      ? `<img class="token-img" src="${t.image_uri}" onerror="this.style.display='none';this.nextSibling.style.display='flex'" /><div class="token-img-placeholder" style="display:none">${(t.symbol||'?')[0]}</div>`
      : `<div class="token-img-placeholder">${(t.symbol||'?')[0]}</div>`;

    const ageBadgeCls = t.age_seconds > 0 && t.age_seconds < 3600 ? 'badge badge-new' : 'badge badge-age';
    const ageText = t.age_str !== 'unknown' ? `⏱ ${t.age_str}` : '⏱ —';

    let socialHtml = '';
    if (t.twitter) socialHtml += `<a class="social-link" href="${t.twitter.startsWith('http') ? t.twitter : 'https://twitter.com/' + t.twitter}" target="_blank">🐦 Twitter</a>`;
    if (t.telegram) socialHtml += `<a class="social-link" href="${t.telegram.startsWith('http') ? t.telegram : 'https://t.me/' + t.telegram}" target="_blank">✈️ Telegram</a>`;
    if (t.website) socialHtml += `<a class="social-link" href="${t.website}" target="_blank">🌐 Website</a>`;
    socialHtml += `<a class="social-link" href="https://pump.fun/${d.ca}" target="_blank">🔥 pump.fun</a>`;
    socialHtml += `<a class="social-link" href="https://dexscreener.com/solana/${d.ca}" target="_blank">📈 DexScreener</a>`;

    const h1Change = pc.h1 !== undefined ? pc.h1 : null;

    const heroHtml = `
      <div class="verdict-hero">
        <div class="token-icon-wrap">
          ${imgHtml}
          <span class="verdict-badge ${vbCls}">${verdict}</span>
        </div>
        <div class="token-info">
          <div class="token-sym-row">
            <span class="t-symbol">$${t.symbol || '?'}</span>
            <span class="t-name">${t.name || ''}</span>
          </div>
          <div class="badge-row">
            <span class="${ageBadgeCls}">${ageText}</span>
            ${t.dex ? `<span class="badge badge-dex">${t.dex.toUpperCase()}</span>` : ''}
          </div>
          ${socialHtml ? `<div class="social-row">${socialHtml}</div>` : ''}
        </div>
        <div class="token-price-block">
          <div class="t-price">${fmtPrice(t.price_usd)}</div>
          ${h1Change !== null ? `<div class="t-chg ${pctCls(h1Change)}">${pctStr(h1Change)} (1h)</div>` : ''}
        </div>
      </div>`;

    // ── Stats grid ────────────────────────────────────────────────────────────
    const statsHtml = `
      <div class="stats-grid">
        <div class="stat-card"><div class="stat-label">Market Cap</div><div class="stat-value">${fmt(t.market_cap)}</div></div>
        <div class="stat-card"><div class="stat-label">FDV</div><div class="stat-value">${fmt(t.fdv)}</div></div>
        <div class="stat-card"><div class="stat-label">Liquidity</div><div class="stat-value">${fmt(t.liquidity_usd)}</div></div>
        <div class="stat-card"><div class="stat-label">Volume 24h</div><div class="stat-value">${fmt(t.volume && t.volume.h24)}</div></div>
      </div>`;

    // ── Price changes ─────────────────────────────────────────────────────────
    const pcHtml = `
      <div class="price-change-row">
        <div class="pc-item"><div class="pc-label">5m</div><div class="pc-val ${pctCls(pc.m5)}">${pctStr(pc.m5)}</div></div>
        <div class="pc-item"><div class="pc-label">1h</div><div class="pc-val ${pctCls(pc.h1)}">${pctStr(pc.h1)}</div></div>
        <div class="pc-item"><div class="pc-label">6h</div><div class="pc-val ${pctCls(pc.h6)}">${pctStr(pc.h6)}</div></div>
        <div class="pc-item"><div class="pc-label">24h</div><div class="pc-val ${pctCls(pc.h24)}">${pctStr(pc.h24)}</div></div>
        <div class="pc-item"><div class="pc-label">Vol 1h</div><div class="pc-val">${fmt(t.volume && t.volume.h1)}</div></div>
        <div class="pc-item"><div class="pc-label">Vol 6h</div><div class="pc-val">${fmt(t.volume && t.volume.h6)}</div></div>
      </div>`;

    // ── Buy/sell ratio ─────────────────────────────────────────────────────────
    function txnRow(label, obj) {
      if (!obj) return '';
      const b = obj.buys || 0, s = obj.sells || 0, tot = b + s;
      if (!tot) return '';
      const bp = (b/tot*100).toFixed(0), sp = (s/tot*100).toFixed(0);
      return `<div class="txn-row">
        <div class="txn-period">${label}</div>
        <div class="ratio-bar"><div class="buy-fill" style="width:${bp}%"></div><div class="sell-fill" style="width:${sp}%"></div></div>
        <div class="txn-nums"><span class="txn-b">B ${b}</span> / <span class="txn-s">S ${s}</span></div>
      </div>`;
    }
    const txnHtml = `
      <div class="txn-card">
        <div class="txn-title">Buy / Sell Pressure</div>
        ${txnRow('5m', txns.m5)}${txnRow('1h', txns.h1)}${txnRow('6h', txns.h6)}${txnRow('24h', txns.h24)}
      </div>`;

    // ── Score gauge + breakdown ───────────────────────────────────────────────
    const dashOffset = CIRC * (1 - score / 100);
    const gaugeHtml = `
      <div class="score-gauge-card">
        <div class="gauge-wrap">
          <svg viewBox="0 0 100 100">
            <circle class="gauge-bg" cx="50" cy="50" r="40" />
            <circle class="gauge-arc" cx="50" cy="50" r="40"
              stroke="${vColor}"
              stroke-dasharray="${CIRC}"
              stroke-dashoffset="${dashOffset}" />
          </svg>
          <div class="gauge-num" style="color:${vColor}">${score}</div>
        </div>
        <div class="gauge-verdict" style="color:${vColor}">${VERDICT_LABEL[verdict]}</div>
      </div>`;

    const bdRows = Object.entries(d.breakdown).map(([k, v]) => {
      const ratio = v.score / v.max;
      const color = bdColor(ratio);
      return `<div class="bd-row">
        <span class="bd-label">${BD_LABELS[k] || k}</span>
        <div class="bd-track"><div class="bd-fill" style="width:${ratio*100}%;background:${color}"></div></div>
        <span class="bd-score" style="color:${color}">${v.score}/${v.max}</span>
      </div>`;
    }).join('');

    const bkHtml = `
      <div class="breakdown-card">
        <div class="bd-title">Score Breakdown (4 Modules)</div>
        ${bdRows}
      </div>`;

    const scoreHtml = `<div class="score-section">${gaugeHtml}${bkHtml}</div>`;

    // ── Dev wallet ────────────────────────────────────────────────────────────
    let devSolCls = 'sol-info', devSolLabel = '— SOL';
    if (t.dev_sol_balance !== null && t.dev_sol_balance !== undefined) {
      const sol = t.dev_sol_balance;
      devSolLabel = `${sol} SOL`;
      if (sol < 0.1) devSolCls = 'sol-danger';
      else if (sol > 50) devSolCls = 'sol-ok';
      else devSolCls = 'sol-warn';
    }
    const devHtml = t.creator ? `
      <div class="dev-card">
        <div class="dev-title">Dev Wallet</div>
        <div class="dev-row">
          <a class="dev-addr" href="https://solscan.io/account/${t.creator}" target="_blank">
            ${shortAddr(t.creator)}
          </a>
          <button class="copy-btn" onclick="copyText('${t.creator}',this)">⧉</button>
          <span class="dev-sol ${devSolCls}">◎ ${devSolLabel}</span>
        </div>
      </div>` : '';

    // ── Description ───────────────────────────────────────────────────────────
    const descHtml = t.description && t.description.length > 5
      ? `<div class="desc-card">${t.description}</div>` : '';

    // ── Signals ────────────────────────────────────────────────────────────────
    const sigRows = d.signals.map(s =>
      `<div class="sig-item ${sigClass(s)}">${s}</div>`
    ).join('');
    const sigHtml = `
      <div class="signals-card">
        <div class="sig-title">All Signals (${d.signals.length})</div>
        ${sigRows}
      </div>`;

    // ── Render ────────────────────────────────────────────────────────────────
    const el = document.getElementById('results');
    el.innerHTML = heroHtml + statsHtml + pcHtml + txnHtml + scoreHtml + devHtml + descHtml + sigHtml;
    el.classList.remove('hidden');
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }

  function copyText(text, btn) {
    navigator.clipboard.writeText(text).then(() => {
      const prev = btn.textContent;
      btn.textContent = '✓';
      setTimeout(() => btn.textContent = prev, 1200);
    });
  }
</script>
</body>
</html>
